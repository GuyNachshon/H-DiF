model:
  in_channels: 5
  out_channels: 3
  patch_size:
  - 4
  - 4
  widths:
  - 128
  - 256
  - 512
  depths:
  - 2
  - 2
  - 8
  d_ffs:
  - 256
  - 512
  - 1024
  self_attns:
  - type: shifted-window
    d_head: 64
    window_size: 8
  - type: shifted-window
    d_head: 64
    window_size: 8
  - type: global
    d_head: 64
  dropout:
  - 0.0
  - 0.0
  - 0.1
  mapping:
    depth: 2
    width: 256
    d_ff: 512
    dropout: 0.0
data:
  root: data/
  size: 256
  clip_len: 1
train:
  lr: 0.0005
  weight_decay: 0.001
  betas:
  - 0.9
  - 0.95
  steps: 20000
  batch_size: 16
  save_every: 5000
  log_every: 50
  val_every: 5000
  val_batches: 16
  wandb: true
  hf_repo: guychuk/h-dif
  ema_decay: 0.999
  lr_min: 5.0e-05
flow:
  t_sampling: logit_normal
  cond_dropout: 0.1
  x0_mode: noise
  x0_alpha: 0.45
temporal:
  gamma: 0.35
  enabled: false
sampling:
  solver: midpoint
  steps: 2
